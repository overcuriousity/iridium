name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install libewf dev package
        run: sudo apt-get update -q && sudo apt-get install -y libewf-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Install libewf dev package
        run: sudo apt-get update -q && sudo apt-get install -y libewf-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Build (workspace)
        run: cargo build

      - name: Test (workspace)
        run: cargo test

  deny:
    name: License & Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: EmbarkStudios/cargo-deny-action@v2

  musl:
    # Builds only the iridium binary for x86_64-unknown-linux-musl.
    # libewf (and its C deps) are not yet cross-compiled for musl; that is
    # addressed in Phase 8 (Hardening).  The ewf-sys crate is not in the
    # binary's dependency graph until Phase 4, so this remains a pure-Rust
    # static binary for now.
    name: Static musl build (binary only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-musl-

      - name: Build iridium binary (musl)
        # Build only the binary crate; ewf-sys is not in its dep graph yet.
        run: cargo build --bin iridium --target x86_64-unknown-linux-musl

      - name: Verify static binary
        run: |
          BIN=target/x86_64-unknown-linux-musl/debug/iridium
          file "$BIN"
          ldd "$BIN" 2>&1 | grep -q "not a dynamic executable" \
            && echo "OK: static binary" \
            || (ldd "$BIN"; exit 1)
