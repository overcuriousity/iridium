name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

# Build tools required by the vendored libewf autotools build.
# These are HARD dependencies — libewf is always compiled from source.
# System packages: autoconf automake libtool gettext pkg-config zlib1g-dev
# (uuid-dev is needed for ewftools but not for the library itself)

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            autoconf automake libtool gettext pkg-config \
            zlib1g-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      # Cache the compiled libewf static library between runs.
      # Keyed on the vendor submodule commit so it rebuilds on upgrades.
      - name: Cache libewf build
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-libewf-${{ hashFiles('vendor/libewf/configure.ac') }}-check
          restore-keys: ${{ runner.os }}-libewf-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            autoconf automake libtool gettext pkg-config \
            zlib1g-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache libewf build
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-libewf-${{ hashFiles('vendor/libewf/configure.ac') }}-test
          restore-keys: ${{ runner.os }}-libewf-

      - name: Build (workspace)
        run: cargo build

      - name: Test (workspace)
        run: cargo test

  deny:
    name: License & Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: EmbarkStudios/cargo-deny-action@v2

  musl:
    # Builds only the iridium binary for x86_64-unknown-linux-musl.
    # The ewf crates are not yet in the binary's dependency graph (Phase 4),
    # so no cross-compiled libewf is needed here.
    name: Static musl build (binary only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-musl-

      - name: Build iridium binary (musl)
        run: cargo build --bin iridium --target x86_64-unknown-linux-musl

      - name: Verify static binary
        run: |
          BIN=target/x86_64-unknown-linux-musl/debug/iridium
          file "$BIN"
          ldd "$BIN" 2>&1 | grep -q "not a dynamic executable" \
            && echo "OK: static binary" \
            || (ldd "$BIN"; exit 1)
