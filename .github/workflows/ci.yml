name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libewf-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --features iridium-ewf-sys/system-libewf -- -D warnings

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libewf-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Build (workspace)
        run: cargo build --features iridium-ewf-sys/system-libewf

      - name: Test (workspace, unit tests)
        run: cargo test --features iridium-ewf-sys/system-libewf --lib

      - name: Test (integration tests, single-threaded)
        # libewf has process-global state; parallel test threads cause
        # spurious "cannot be changed" errors across handles.
        run: cargo test --features iridium-ewf-sys/system-libewf --test roundtrip -- --test-threads 1

  deny:
    name: License & Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: EmbarkStudios/cargo-deny-action@v2

  musl:
    # Builds the pure-Rust library crates for x86_64-unknown-linux-musl to
    # verify they remain statically linkable. iridium-app and the ewf crates
    # are excluded because they link against system libewf, which has no
    # musl-static package available; that constraint is accepted by design.
    name: Static musl build (core libs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-musl-

      - name: Build core library crates (musl)
        run: |
          cargo build --target x86_64-unknown-linux-musl \
            -p iridium-core \
            -p iridium-hash \
            -p iridium-audit \
            -p iridium-device \
            -p iridium-acquire \
            -p iridium-recovery
