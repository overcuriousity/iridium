name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libewf-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --features iridium-ewf-sys/system-libewf -- -D warnings

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libewf-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Build (workspace)
        run: cargo build --features iridium-ewf-sys/system-libewf

      - name: Test (workspace)
        run: cargo test --features iridium-ewf-sys/system-libewf

  deny:
    name: License & Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: EmbarkStudios/cargo-deny-action@v2

  musl:
    # Builds only the iridium binary for x86_64-unknown-linux-musl.
    # The ewf crates are not yet in the binary's dependency graph (Phase 4),
    # so no cross-compiled libewf is needed here.
    name: Static musl build (binary only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-musl-

      - name: Build iridium binary (musl)
        run: cargo build --bin iridium --target x86_64-unknown-linux-musl

      - name: Verify static binary
        run: |
          BIN=target/x86_64-unknown-linux-musl/debug/iridium
          file "$BIN"
          ldd "$BIN" 2>&1 | grep -qE "not a dynamic executable|statically linked" \
            && echo "OK: static binary" \
            || (ldd "$BIN"; exit 1)
