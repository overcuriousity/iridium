[graph]
targets = []

[licenses]
# Only allow GPL-3-compatible licenses in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "GPL-3.0-or-later",
]

[advisories]
version = 2
ignore = []

[bans]
multiple-versions = "warn"
# Intra-workspace path deps don't carry version numbers by design.
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
